name: CI Retraining Workflow

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd MLProject
          # Set MLFLOW_TRACKING_URI to local mlruns folder so it saves artifacts locally
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          mlflow run . --env-manager=local
          
      - name: Read Run ID
        id: get_run_id
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID is $RUN_ID"

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/mlflow.db

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image using MLflow
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n $DOCKER_USER/titanic-model:latest
          
      - name: Push Docker Image to Docker Hub
        run: |
          DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          docker push $DOCKER_USER/titanic-model:latest
